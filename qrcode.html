<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code — Livret d'accueil Ty an aod</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: #f5f6fa;
  }
  .card {
    background: #fff; border-radius: 20px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.1);
    padding: 3rem 2.5rem; text-align: center;
    max-width: 400px; width: 90%;
  }
  .icon { font-size: 3rem; margin-bottom: .5rem; }
  h1 { font-size: 1.8rem; color: #1a5276; margin-bottom: .3rem; }
  .subtitle { color: #7f8c8d; font-size: 1rem; margin-bottom: 2rem; }
  .qr-img {
    border: 3px solid #ecf0f1; border-radius: 12px;
    padding: 12px; background: #fff; display: inline-block;
  }
  .qr-img img { display: block; }
  .instructions {
    margin-top: 1.5rem; font-size: .95rem; color: #2c3e50; line-height: 1.6;
  }
  .url {
    margin-top: 1rem; font-size: .8rem; color: #95a5a6;
    word-break: break-all;
  }
  .print-btn {
    margin-top: 2rem; display: inline-block;
    background: #1a5276; color: #fff;
    padding: .8rem 2rem; border-radius: 50px;
    border: none; font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: background .2s;
  }
  .print-btn:hover { background: #2980b9; }

  @media print {
    body { background: #fff; }
    .card { box-shadow: none; border: 2px solid #ddd; }
    .print-btn { display: none; }
    .no-print { display: none; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🏠</div>
  <h1>Ty an aod</h1>
  <p class="subtitle">Livret d'accueil digital</p>

  <div class="qr-img">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https%3A%2F%2Fpjaff13.github.io%2Fpascal%2Flivret.html"
         alt="QR Code — Livret d'accueil" width="250" height="250">
  </div>

  <p class="instructions">
    📱 Scannez ce QR code avec l'appareil photo<br>de votre téléphone pour accéder au<br><strong>livret d'accueil complet</strong>
  </p>
  <p class="instructions" style="font-size:.85rem; color:#7f8c8d;">
    🇬🇧 Scan this QR code with your phone camera<br>to access the <strong>digital welcome guide</strong>
  </p>

  <p class="url">pjaff13.github.io/pascal/livret.html</p>

  <button class="print-btn no-print" onclick="window.print()">🖨️ Imprimer</button>
</div>
</body>
</html>
